name: Terraform CI

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'infrascope/**'
      - 'policies/**'

permissions:
  id-token: write   # OIDC
  contents: read
  pull-requests: write  # InfraScope posts comments
  security-events: write  # SARIF upload

env:
  TF_DIR: terraform/environments/dev
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: terraform validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: ${{ env.TF_DIR }}

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint --init && tflint --recursive
        working-directory: terraform

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true  # don't block PR on checkov alone--InfraScope gates

      - name: upload sarif
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false  # raw output for plan JSON

      - name: terraform init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: terraform plan
        run: |
          terraform plan -out=tfplan
          terraform show -json tfplan > plan.json
        working-directory: ${{ env.TF_DIR }}

      - uses: actions/upload-artifact@v4
        with:
          name: plan-output
          path: |
            ${{ env.TF_DIR }}/tfplan
            ${{ env.TF_DIR }}/plan.json

  infrascope:
    name: InfraScope Analysis
    runs-on: ubuntu-latest
    needs: [plan, security-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: plan-output
          path: plan-output/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install infrascope
        run: pip install -e ".[dev]"

      - name: run analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python -m infrascope.analyzer \
            plan-output/plan.json \
            --pr-comment \
            --repo "$REPO_NAME" \
            --pr "$PR_NUMBER"
